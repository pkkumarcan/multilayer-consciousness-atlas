canonical:
  ruler: "Goddess Avidya (also known as Durga or Malin Maya)"
  sound: "Sound of a blowing shell / cosmic wind whispering through space"
  light: "Dark blackish blue (representing the vast, dark expanse of unmanifest space)"
  geometry: "Sixteen-petaled dark-blue lotus with a white circle representing the Akasha (Space/Ether) element"
