id: floor_9
canonical_name: "Shoonya / Daswan Dwar"
sanskrit_name: "शून्य · दसवां द्वार · The Void · The Tenth Gate · Realm of Par-Brahm"
alternate_names:
  - "Daswan Dwar"
  - "Shoonya"
  - "The Void"
  - "Tenth Gate"
  - "Par-Brahm Dham"
  - "Mansarovar"

classification:
  level: 9
  realm: "Brahmanda"
  category: "astral"

canonical:
  ruler: "Par-Brahm (the formless absolute beyond the causal mind)"
  sound: "Sweet playing of stringed instruments like the Sarangi (violin/fiddle) and Kingri (lute)"
  light: "Brilliant, self-effulgent white light resembling a cluster of full moons or thousands of suns"
  geometry: "A vast, formless empty void with a central celestial lake (Mansarovar) of pure nectar"
  petals:
    count: 12
    color: "pure crystal white"
    seed_syllables: []
  teachings: |
    Shoonya (meaning 'The Void') or Daswan Dwar (meaning 'The Tenth Gate') is the third major stage of the Brahmanda region, situated immediately above Trikuti (the causal plane). It represents a critical spiritual milestone: the boundary where the soul completely transcends the three worlds of material, astral, and causal creation, and leaves behind the universal causal mind (Brahmandi Mana). 
    
    Located here is the legendary celestial lake known as Mansarovar (the Lake of Nectar or Pool of Truth). Upon entering Shoonya, the soul is instructed to plunge into this formless pool of divine nectar. Bathing in Mansarovar washes away all remaining causal residues, subtle karmas, and mental impressions (samskaras) collected during the soul's long descent through the lower planes. 
    
    Upon emerging from the lake, the soul is stripped of all its subtle envelopes (physical, astral, and causal bodies). It stands as a naked, self-effulgent spirit (Atman), radiating with a brilliant light equivalent to the brightness of twelve suns. The primary sound current here is the sweet, classical playing of stringed instruments, primarily the Sarangi (violin/fiddle) and Kingri (lute). Beyond this stage, the soul travels in its pure spiritual form, free from the gravity of mental and material creation.
  mantra: "Rarankar"
  recitation: "Akal"
  consorts: "Akshar Purush (the unmanifest power)"
  function: "Purification of the causal body, baptism of the soul in Mansarovar, and transition to pure spirit travel"

comparative:
  sufism:
    term: "Alam-e-Lahoot"
    description: |
      The Sufis call this stage Alam-e-Lahoot, the realm of absolute divine light, formless spirit, and unmanifest essence. It is the plane where the soul experiences Fana (annihilation of individual ego) and begins to taste Baqa (subsistence in God). Here, the soul is stripped of all cosmic attributes (Sifat) and prepares to enter the absolute unmanifest essence (Hahoot).
  taoism:
    term: "The Void of Wuji"
    description: |
      In Taoist philosophy, this corresponds to Wuji—the primordial, unmanifest, absolute emptiness that precedes the creation of Yin and Yang (Taiji). It is the state of pure formless potential, where the alchemical seeker dissolves their refined spirit back into the infinite, silent Tao, returning to the origin of all existence.
  kabbalah:
    term: "Chesed / The Supernal Abyss Crossing"
    description: |
      Represents the crossing of the great Abyss (Da'at) into the supernal triad, entering the sphere of Chesed (Mercy/Lovingkindness). In Kabbalah, crossing the Abyss requires the soul to strip off all individual mental and causal structures (represented by the lower sephiroth), surrendering the ego to be reborn as a pure spiritual spark.
  buddhism:
    term: "Sunyata / Akasanantyayatana"
    description: |
      Maps directly to Sunyata (the ultimate emptiness or voidness), which is understood in Mahayana Buddhism not as mere nothingness, but as the formless, interdependent nature of all reality. In Theravada/Abhidharma, it corresponds to the first Arupa-jhana (formless absorption) of Akasanantyayatana (the sphere of infinite space), where all physical and mental forms completely dissolve.
  christianity:
    term: "The Third Heaven / The Sea of Glass"
    description: |
      Corresponds to the Apostle Paul's account of being caught up to the 'Third Heaven' (2 Corinthians 12:2) where he heard unspeakable words, and John's vision of the 'Sea of Glass like crystal' before the Throne of God (Revelation 4:6), symbolizing the completely purified, transparent soul reflecting divine light.
  gnosticism:
    term: "The Outer Pleroma / Realm of Sophia's Redemption"
    description: |
      The boundary where the soul is fully redeemed from the material and causal spheres of the Demiurge. The soul must strip off all planetary garments (the astral/causal weights of the archons) to stand as a pure, naked spiritual entity (pneumatic) ready to enter the true, unmanifest divine fullness (Pleroma).
  hindu_tantra:
    term: "Upper Sahasrara / Niralamba Void"
    description: |
      The subtle region within the crown chakra known as the Niralamba (supportless) void, where the mind ceases all its modifications (Chitta Vritti Nirodha) and experiences the absolute silence of formless Brahman.
  sikhism:
    term: "Dasam Dwar / Mansarovar"
    description: |
      Daswan Dwar (the Tenth Gate) is heavily celebrated in Gurbani as the gate of liberation. Guru Amar Das writes: 'Nau dar thakey dhavat rahey, dasvai nij-ghar vaasa pae' (The nine organs cease their outward running, and the soul dwells in the tenth gate, its true home). Mansarovar is described in the Adi Granth as the lake of truth where the Gurmukhs bathe and collect pearls of wisdom. Kabir's Shabad: 'Trikuti chhootai daswaa dwaar, Mansarovar karahu asnaan... tahan shabd Sarangi sitar baje'.
  vedic:
    term: "Par-Brahman"
    description: |
      The Upanishads describe the transition beyond Hiranyagarbha (the golden womb/causal mind) into Par-Brahman—the formless, attributeless, and unmanifest absolute reality (Nirguna Brahman) that cannot be described by speech or grasped by the mind.
  jainism:
    term: "Shukla Dhyana / Ayoga Kevali Threshold"
    description: |
      The threshold of Shukla Dhyana (pure, formless meditation) where the Jain ascetic eliminates all mental, verbal, and physical activities (Yoga), preparing the soul to cast off the final karmic causal body to achieve absolute, formless liberation (Siddhashila).

science:
  neuroscience:
    regions:
      - "Parieto-Temporal-Occipital Association Area (Total Gating)"
      - "Reticular Activating System (RAS) Suppression"
    networks:
      - "Non-Dual Awareness State"
      - "Complete Default Mode Network (DMN) Dissolution"
    description: |
      Correlates with the profound state of Non-Dual Awareness, where the brain's sensory gating mechanisms completely suppress all somatic, spatial, and temporal representations. The deep, unified gamma synchronization (40-100 Hz) across the fronto-parietal and insular regions, combined with complete deactivation of the Default Mode Network, induces the subjective experience of infinite space, empty voidness, and absolute peace. The sweet stringed sounds (violin/lute) map to complex acoustic processing within the primary and secondary auditory cortices under high meditative state binding.
    confidence: "Medium"
  endocrinology:
    description: |
      Associated with the total stabilization of the neuroendocrine system, inducing deep physical metabolic rest (hypometabolism), where cellular respiration and oxygen consumption drop to their lowest physiological thresholds.
  psychology:
    ego_state: "The Formless Self / Transcendence of the Causal Ego"
    description: |
      The transcendence of all archetypal form-identities (the collective unconscious). In transpersonal psychology, this represents the transition from the Subtle level to the Causal level (Ken Wilber's model)—the void state where the soul is fully stripped of individual identity, experiencing pure, undifferentiated witness consciousness.
  cosmology:
    description: |
      Symbolized by the 'Dark Ages' of the early universe—the era preceding the ignition of the first stars, where space was formless, empty, and silent, yet pregnant with the unmanifest potential of cosmic evolution.
  information_theory:
    description: |
      The zero-entropy information state. The absolute compression of all physical laws and forms back into a singular, formless, and unmanifest mathematical void before projection.

phenomenology:
  emotional_tone: |
    Absolute serenity, supreme detachment, and limitless freedom. The soul feels an incredible lightness and relief, having cast off the crushing weight of the physical body, the astral desires, and the causal mind.
  visual_texture: |
    A vast, limitless, and completely empty void of dazzling, crystal-clear white light, like standing in a supportless space illuminated by billions of full moons. The celestial pool of Mansarovar appears as a shimmering, formless lake of glowing liquid nectar.
  auditory_texture: |
    A sweet, incredibly delicate, and classical playing of stringed instruments, primarily the Sarangi (violin/fiddle) and Kingri (lute), which echoes through the void without any echo or vibration, exerting a soothing, upward pull on the soul.
  ego_effect: |
    The complete dissolution of all individual boundaries. The soul is no longer an individual "I," but a vast, self-effulgent spirit (Atman) that is identical to the formless absolute.
  risks: |
    The final trap of the formless void. Seekers may mistake this state of supreme emptiness and non-dual peace for the ultimate, absolute Source (Sat Lok) and refuse to progress further, unaware that the void of Par-Brahm is still a secondary threshold within the created universe.
  transitions:
    from_previous: |
      Ascending from the causal setting-sun of Trikuti (Floor 8), the soul must strip off the causal body and plunge into the celestial pool of Mansarovar, emerging as a naked, self-effulgent spirit in the crystal void of Shoonya.
    to_next: |
      To ascend to Maha Shoonya (Floor 10), the soul must traverse a vast, dark, and silent abyss of absolute nothingness, requiring absolute direction and the guide of the Sat-Guru to prevent losing orientation.

