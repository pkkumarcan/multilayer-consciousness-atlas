gateway_experience:
  tradition: Gateway Experience / Monroe Institute
  epistemic_label: Phenomenological · Empirical
  tapes: []
  bridge_note: >-
    Floor 18 (Radhasoami — the Absolute, Nameless, Formless Supreme) is beyond all maps, all systems, and all
    technology. No Gateway Experience tape is assigned here. Monroe's system, at its deepest point (Focus 34/35, The
    Absolute), acknowledges the existence of what lies beyond but provides no guided path into it. Kabir's poem 'Kar
    Naino Deedar' was composed from the direct experience of this ultimate state — an experience that transcends all
    technique, all framework, and all comparative analysis. This floor stands in the Atlas as a reminder that the
    greatest cartographies are humbled at the boundary of the Absolute.
  map_limit_note: >-
    No Gateway Experience tapes map to this floor. Monroe's deepest station (Focus 34/35) is itself only a distant
    approach to the Radhasoami state. The path to Floor 18 is described in Sant Mat as accessible only through the grace
    of a perfect living Master (Sat-Guru) and the inner Shabd (Sound Current) — not through any external technique or
    audio technology.
  tape_count: 0
