canonical:
  ruler: "Radhasoami (the absolute, nameless, and formless Supreme Being, the final Source of all existence)"
  sound: "Infinite, silent resonance (completely beyond all vibratory currents and sound-waves)"
  light: "Indescribable, blinding unmanifest radiance of absolute pure spirit, completely beyond the light of countless suns"
  geometry: "A formless, infinite spiritual expanse of pure unmanifest essence"
  petals:
    count: 10000000000000000
    color: "self-effulgent white-gold"
    seed_syllables: []
  teachings: |
    Secret Stage 18 is the absolute, supreme, and final peak of all consciousness realms in the Radhasoami / Sant Mat apex. These stages are completely beyond the standard 15-stage cosmology of classic Radhasoami and Sant Mat, and represent the absolute unmanifest source of all existence (Radhasoami Dham). 
    
    The ruler is Radhasoami itself, the nameless, formless Supreme Being of pure love, truth, and spirit. The sound is an infinite, subtle, and silent resonance beyond all vibratory currents, and the light is completely unmanifest pure spirit.
  mantra: "Radhasoami"
  recitation: "Radhasoami"
  consorts: "None (completely beyond all polarities)"
  function: "Ascension into the unmanifest spiritual planes, deep formless absorption, and realization of the ineffable God"

comparative:
  sufism:
    term: "Ahadiyyat / Absolute Oneness"
    description: |
      In Sufism, Secret Stage 18 corresponds to the station of Ahadiyyat—absolute oneness, where even the unmanifest essence dissolves into the singular, absolute unity beyond any attributes. Here, the soul experiences the transition from Fana (ego-annihilation) to absolute union with the unmanifest and nameless God. The absolute Silence mirrors the unceasing, formless vibration of the divine breath before it articulates into names or qualities.
  taoism:
    term: "The Source before the Nameless Tao"
    description: |
      In Taoist philosophy, this represents the source that precedes even the Nameless Tao described in the opening of the Tao Te Ching. It is the absolute, nameless essence that precedes even formless emptiness (Wuji), representing the unmanifest source from which all dimensions and dualities emerge.
  kabbalah:
    term: "Ayin Sof Aur absolute"
    description: |
      Ayin Sof Aur (The Infinite Light) is the third veil of the unmanifest infinite (Ein Sof) that lies completely beyond the crown (Kether). It represents the unmanifest, unperceivable source of all creation, where all forms, thoughts, and individual concepts of existence dissolve into absolute primordial silence.
  buddhism:
    term: "Adi-Buddha / Parinirvana Peak"
    description: |
      In Mahayana Buddhism, this represents the Adi-Buddha state—the absolute, unmanifest primordial essence of the formless mind. It represents the realization of the absolute formless body of the Buddha (Dharmakaya) beyond any spatial or temporal designations.
  christianity:
    term: "The Godhead (Deitas) beyond the Father (Deus)"
    description: |
      Corresponds to Meister Eckhart's description of the absolute Godhead (Deitas) that lies completely beyond the personal God (Deus). It represents the unmanifest, silent source of the divine, which is completely beyond sensory and cognitive grasp.
  gnosticism:
    term: "The Ineffable Parent / The Fore-Father"
    description: |
      In Gnostic cosmology, the Ineffable Parent or Fore-Father exists in absolute silence and contemplation before any emanations. Reentering this depth represents the soul's return to the ultimate primordial source of the Pleroma.
  hindu_tantra:
    term: "Agyata Sahasrara Peak"
    description: |
      The highest, unmapped peak of the Sahasrara vertex, where the soul moves beyond the Shiva-Shakti union into the absolute, formless space of the attributeless Brahman (Nirguna Brahman) that cannot be grasped by the intellect.
  sikhism:
    term: "The Unmanifest Nirankar"
    description: |
      Gurbani and Sant Mat utilize the unmanifest state of the Nirankar (the formless Creator) to describe this highest plane. Guru Nanak writes: 'Nirankar apara param purakh ki ghati' (The formless Lord is unapproachable and limitless). Kabir's Shabad describes: 'Secret stage 18 has no physical description...'.
  vedic:
    term: "Nirguna Brahman"
    description: |
      The Mandukya Upanishad describes the supreme state of the Self (Turiya) as Nirguna Brahman—the formless, attributeless, and unmanifest Brahman who is completely beyond sensory and cognitive grasp.
  jainism:
    term: "Param-Samadhi / Pure Soul Absorption"
    description: |
      The state of Param-Samadhi (supreme absorption) where the soul resides eternally in its own unmanifest, formless essence, experiencing the absolute fullness of its spiritual attributes without any relationship to physical or causal universes.

science:
  neuroscience:
    regions:
      - "Complete Bi-Hemispheric Coherence"
      - "Cortical Deactivation Peak"
    networks:
      - "Attributeless Awareness Network"
      - "Complete Cognitive Gating (Formless Absorption)"
    description: |
      Correlates with the profound state of Attributeless Awareness, characterized by peak bi-hemispheric coherence and widespread cortical deactivation. Under this state, the brain ceases to process any structural attributes, forms, or localized spatial inputs, maintaining a highly unified, stable theta-gamma coupling that indexes pure, formless witness consciousness. The absolute Silence maps to complex auditory-association harmonics under high-frequency phase binding.
    confidence: "Medium"
  endocrinology:
    description: |
      Associated with the total physiological stabilization and metabolic rest, where cellular energy consumption and HPA axis activity reach their absolute minimum, facilitating profound cellular healing.
  psychology:
    ego_state: "The Unmanifest Self / Attributeless Witness"
    description: |
      The realization of the Unmanifest Self. In transpersonal psychology, this represents the transition to the highest causal/non-dual level (Ken Wilber's model)—the state of pure witness consciousness that is completely detached from all forms, thoughts, and archetypal identities.
  cosmology:
    description: |
      Symbolized by the state of cosmic expansion before reionization—the vast, dark, and silent era of the early universe that was empty of stars, yet pregnant with the unmanifest potential of cosmic evolution.
  information_theory:
    description: |
      The unmanifest information state—the absolute compression of all physical laws and forms back into a singular, formless, and unmanifest mathematical code before projection.

phenomenology:
  emotional_tone: |
    Profound serenity, unshakeable peace, and limitless freedom. The soul is filled with the most intense, quiet sense of awe and reverence, experiencing a state of deep, formless absorption.
  visual_texture: |
    An infinite, blindingly beautiful white-gold ocean of pure, self-luminous spiritual light, with a formless expanse where the form of the ruler is completely beyond any description or sight.
  auditory_texture: |
    Absolute, supreme Silence, which echoes through the formless expanse, filling the soul with absolute, bliss-giving vibrations.
  ego_effect: |
    The absolute resolution of separation. The soul merges fully into the ruler, realizing: "I am the unmanifest Source, I am one with the Supreme Lord."
  risks: |
    None. This is the realm of absolute safety and permanent liberation, completely beyond the traps of Maya and the causal mind.
  transitions:
    from_previous: |
      Ascending from the unmanifest space of Secret Stage 17 (Floor 17) by dissolving all concepts of a localized ruler, and popping out into the vast, formless unmanifest space of Secret Stage 18.
    to_next: |
      The soul, now fully absorbed in Secret Stage 18, has reached the absolute peak of the pure spiritual realms, completing the ascension.

