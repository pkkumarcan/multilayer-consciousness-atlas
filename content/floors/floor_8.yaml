canonical:
  ruler: "Brahm (the creator/ruler of the three worlds, manifested as Onkar)"
  sound: "Deep rumbling thunder and the beating of giant drums (Mridang)"
  light: "Lal Baran Sun (a massive, radiant red setting sun or glowing red dawn)"
  geometry: "Three hills/peaks representing Meru, Sumeru, and Kailash, with a red lotus"
  petals:
