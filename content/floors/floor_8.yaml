    seed_syllables:
      - "a"
      - "u"
      - "m"
      - "bindu"
      - "nada"
      - "kala"
      - "jyoti"
      - "niranjan"
  teachings: |
    Trikuti is the second stage of the Brahmanda (astral/causal) region and is the headquarters of the Universal Mind (Brahmandi Mana). It is named Trikuti because of the presence of three massive spiritual mountains or peaks that the soul witnesses upon arrival. 
    
    This plane is the birthplace of the three Gunas (Sattva/harmony, Rajas/activity, Tamas/inertia), the four Vedas, and all the archetypal symbols, languages, and seed ideas that manifest in the lower physical and astral universes. The primary sound current here is the Pranava or Onkar, which reverberates throughout the entire causal universe like deep, rhythmic thunder.
    
    To stay in Trikuti, the soul must strip off the physical mind (Pindi Mana) and wrap itself in the causal body. However, Trikuti is also the domain of Kal (the negative power or cosmic time). Kal masquerades as the ultimate Supreme God, and because the soul experiences "Aham Brahmasmi" ("I am Brahm") here, it is extremely easy to become deceived. The soul may believe it has reached the absolute source of reality and refuse to ascend further. True saints teach that this is only the second major gateway, and the soul must eventually transcend even the universal mind to reach pure spirit.
  mantra: "OM"
  recitation: "Onkar"
  consorts: "Maya (in her causal, unmanifest state)"
  function: "Seat of the universal causal mind; origin of cosmic creation and the three gunas"

comparative:
  sufism:
    term: "Alam-e-Jabroot"
    description: |
      The Sufis call this plane Alam-e-Jabroot, the realm of power, divine majesty, and causal determination. It is the plane where the soul is purified of individual attributes and experiences the divine names and archetypes in their unmanifest power. It sits above the angelic world of forms (Malkut) and below the realm of pure unity (Lahoot).
  taoism:
    term: "Middle Dantian / Primordial Qi Realm"
    description: |
      Corresponds to the Middle Dantian centered in the chest, but elevated to its causal cosmic equivalent where individual life energy (Qi) dissolves back into the Primordial, undifferentiated Qi (Yuan Qi) of the cosmos, representing the transition from form to formless essence.
  kabbalah:
    term: "Binah / Tiphereth Border"
    description: |
      Stands at the threshold of Binah (Understanding/The Cosmic Mother, the womb of form) and Tiphereth (Beauty/The Sun, the central harmonizing sphere of the Tree of Life). Binah represents the causal origin of the lower spheres, while the Lal Baran Sun mirrors the blinding, beautiful solar radiance of Tiphereth.
  buddhism:
    term: "Rupa-dhatu / Alaya-vijnana threshold"
    description: |
      In Buddhist cosmology, this represents the highest sub-planes of the Rupa-dhatu (form realm) where consciousness is highly refined, bordering on the formless realm (Arupa-dhatu) and the Alaya-vijnana (storehouse consciousness), which contains the karmic seeds of all potential manifestations.
  christianity:
    term: "The Throne of Majesty"
    description: |
      Associated with the vision of the Throne of God in Ezekiel and Revelation—surrounded by a rainbow of fire, rumbling thunder, and the sounding of trumpets, representing the majestic, causal governing center of the created universe.
  gnosticism:
    term: "Domain of the Demiurge / Yaldabaoth"
    description: |
      This is the exact parallel to the Sant Mat concept of Kal/Brahm. In Gnosticism, the Demiurge is the blind creator god who rules the causal and material worlds, claiming "I am God and there is no other." The Gnostic seeker must recognize the Demiurge's limitations and pass through his causal gateway to reach the true, formless Father (Pleroma/Dayal Desh).
  hindu_tantra:
    term: "Lower Sahasrara / Pranava Dham"
    description: |
      The region immediately preceding the absolute crown, where the sound of the cosmic syllable OM (Pranava) originates. It is the realm of the unmanifest Shabda-Brahman (God as sound-vibration).
  sikhism:
    term: "Trikuti / Onkar"
    description: |
      Mentioned extensively in the Guru Granth Sahib as the realm of the three qualities (gunas) that must be crossed. Guru Nanak writes: "Kiyu gur binu trikuti chhutsi" (Without the Guru, how can one escape the entrapment of Trikuti?). Kabir's Shabad describes: "Trikuti surti dharau... tahan shabd Onkara hai."
  vedic:
    term: "Hiranyagarbha"
    description: |
      The golden womb or golden egg of cosmic creation described in the Rig Veda. It is the source of all light, form, and energy in the universe—the universal soul or mind that precedes physical manifestation.
  jainism:
    term: "Karmic Causal Body (Karmana Sharira)"
    description: |
      The deep causal layer of the soul where the finest, most stubborn seeds of karma are stored. Transcending Trikuti corresponds to the dissolution of this causal body to achieve absolute liberation (Moksha).

science:
  neuroscience:
    regions:
      - "Association Cortices (Parieto-Occipito-Temporal)"
      - "Deep Limbic System Core"
    networks:
      - "Salience Network"
      - "High-Level Cognitive Integration Networks"
    description: |
      Correlates with the high-level association cortices that integrate diverse spatial, temporal, and sensory maps into a single, unified experience of reality. The deep auditory resonance of thunder maps to low-frequency synchronized neural oscillations (delta and theta bands) in the auditory and limbic systems, which evoke feelings of absolute scale, gravity, and cosmic awe.
    confidence: "Medium"
  endocrinology:
    description: |
      Associated with the deep regulation of the hypothalamic-pituitary-adrenal (HPA) axis, governing the long-term metabolic and stress cycles of the body. Causal stillness stabilizes this axis, leading to deep physical rejuvenation.
  psychology:
    ego_state: "Universal Causal Self / Archetypal Integration"
    description: |
      Jung's concept of the archetype of the Self at the deepest layer of the collective unconscious. Here, the seeker experiences the "Aham Brahmasmi" state, where the boundary between the individual mind and the universal mind dissolves, running the risk of inflation (spiritual ego/demiurgic hubris).
  cosmology:
    description: |
      Symbolized by the Cosmic Microwave Background (CMB)—the primordial red-shifted heat signature of the Big Bang that pervades all space, representing the physical birth of time and form.
  information_theory:
    description: |
      The causal compression layer of the universe. All physical laws, constants, and structures are compressed into seed algorithms (the unmanifest information matrix) before expanding into spacetime entropy.

phenomenology:
  emotional_tone: |
    Cosmic awe, overwhelming majesty, and absolute authority. The soul is struck by the intense, crushing grandeur of the red sun and the rhythmic thunder, experiencing a state of deep, silent reverence.
  visual_texture: |
    A vast, glowing red landscape dominated by three massive, silent mountain peaks rising out of an ocean of red sunset light. The entire sky is saturated with a warm, crimson-gold glow.
  auditory_texture: |
    A continuous, deep, resonant rumbling of cosmic thunder, coupled with the slow, powerful, rhythmic beating of a massive mridang drum, which vibrates not in the ears, but in the very core of the causal body.
  ego_effect: |
    The local ego is completely extinguished, replaced by a vast, universal identity. The soul feels: "I am the creator, I am the mind of the universe." This is the ultimate peak of mental evolution.
  risks: |
    The supreme trap of spiritual entrapment. Because the soul feels identical to the universal mind, it believes it has achieved absolute liberation and union with God. The negative power (Kal) uses this sublime experience to halt the soul's ascent, keeping it bound within the cycles of causal creation.
  transitions:
    from_previous: |
      After exiting Sahasra-Dal-Kamal (floor 7), the soul must navigate a dark, crooked, and winding passage known as the Bunk-Nal (crooked tunnel). Passing through this narrow, curved conduit requires absolute focus and surrender, leading directly out into the expansive red sunset of Trikuti.
    to_next: |
      To ascend to Shoonya / Daswan Dwar (floor 9), the soul must completely discard its universal mind (Brahmandi Mana) and causal body. It must plunge into the formless, celestial lake of Mansarovar, where it washes away all causal residue and emerges as a naked, self-effulgent spirit (Atman) ready for formless travel.

